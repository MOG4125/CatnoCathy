<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no, maximum-scale=1" />
  <meta name="apple-mobile-web-app-capable" content="true" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <title>CatnoCathy — Web Terminal</title>
  <link rel="stylesheet" href="https://unpkg.com/xterm/css/xterm.css" />
  <style>
    * {
      box-sizing: border-box;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }

    body, html {
      height: 100%;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #000;
      font-family: system-ui, -apple-system, sans-serif;
      position: fixed;
      width: 100%;
      top: 0;
      left: 0;
    }

    header {
      padding: 8px;
      background: #222;
      color: white;
      font-family: sans-serif;
      flex-shrink: 0;
      z-index: 100;
    }

    #terminal {
      flex: 1 1 auto;
      overflow: hidden;
      position: relative;
    }

    /* xterm styling for mobile */
    .xterm {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      width: 100%;
      height: 100%;
    }

    .xterm-viewport {
      overflow-y: scroll;
      -webkit-overflow-scrolling: touch;
    }

    /* Ensure focus on mobile */
    .xterm textarea {
      position: fixed;
      opacity: 0;
      left: -9999px;
      top: -9999px;
      width: 1px;
      height: 1px;
      outline: none;
      border: none;
      padding: 0;
      margin: 0;
      z-index: 0;
    }

    @media (max-width: 768px) {
      header small {
        display: none;
      }
    }
  </style>
</head>
<body>
  <header>CatnoCathy Web Terminal — <small>use responsibly (not for public / unauthenticated use)</small></header>
  <div id="terminal"></div>

  <script src="https://unpkg.com/xterm/lib/xterm.js"></script>
  <script src="https://unpkg.com/xterm-addon-fit/lib/xterm-addon-fit.js"></script>
  <script src="app.js"></script>
</body>
</html>
